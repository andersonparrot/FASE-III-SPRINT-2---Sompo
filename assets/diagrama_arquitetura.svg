<svg width="100%" viewBox="0 0 680 720" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Diagrama de Arquitetura AGROENERGY</title>
  <desc>Pipeline completo: Sensores/Simulação → Processamento Python → Oracle DB → Modelo ML → Dashboard → Personas</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: 'Segoe UI', Arial, sans-serif; fill: #1a1a1a; }
      .th  { font-size: 14px; font-weight: 600; }
      .ts  { font-size: 12px; font-weight: 400; fill: #555; }
      .box-teal   { fill: #E1F5EE; stroke: #1D9E75; }
      .box-purple { fill: #EEEDFE; stroke: #534AB7; }
      .box-blue   { fill: #E6F1FB; stroke: #185FA5; }
      .box-coral  { fill: #FAECE7; stroke: #993C1D; }
      .box-amber  { fill: #FAEEDA; stroke: #854F0B; }
      .box-green  { fill: #EAF3DE; stroke: #3B6D11; }
      .box-gray   { fill: #F1EFE8; stroke: #5F5E5A; }
      .arr        { stroke: #888780; fill: none; }
    </style>
  </defs>

  <!-- Camada 1: Entrada -->
  <text class="ts" x="340" y="28" text-anchor="middle" fill="#888">Entrada</text>
  <line x1="100" y1="34" x2="240" y2="34" stroke="#ccc" stroke-width="0.5"/>
  <line x1="440" y1="34" x2="580" y2="34" stroke="#ccc" stroke-width="0.5"/>

  <rect x="60" y="46" width="180" height="56" rx="8" stroke-width="0.5" class="box-teal"/>
  <text class="th" x="150" y="72" text-anchor="middle">Sensores / APIs</text>
  <text class="ts" x="150" y="89" text-anchor="middle">8 equipamentos agrícolas</text>

  <rect x="440" y="46" width="180" height="56" rx="8" stroke-width="0.5" class="box-purple"/>
  <text class="th" x="530" y="72" text-anchor="middle">gerar_dados.py</text>
  <text class="ts" x="530" y="89" text-anchor="middle">Simulação — 46.080 registros</text>

  <line x1="240" y1="74" x2="296" y2="74" class="arr" stroke="#1D9E75" marker-end="url(#arrow)"/>
  <line x1="440" y1="74" x2="384" y2="74" class="arr" stroke="#534AB7" marker-end="url(#arrow)"/>

  <rect x="296" y="46" width="88" height="56" rx="8" stroke-width="0.5" class="box-gray"/>
  <text class="th" x="340" y="69" text-anchor="middle">CSV</text>
  <text class="ts" x="340" y="87" text-anchor="middle">leituras_energia</text>

  <line x1="340" y1="102" x2="340" y2="138" class="arr" marker-end="url(#arrow)"/>

  <!-- Camada 2: Processamento -->
  <text class="ts" x="340" y="130" text-anchor="middle" fill="#888">Processamento</text>

  <rect x="60" y="152" width="188" height="56" rx="8" stroke-width="0.5" class="box-blue"/>
  <text class="th" x="154" y="177" text-anchor="middle">banco_sql.py</text>
  <text class="ts" x="154" y="194" text-anchor="middle">Ingestão → Oracle DB</text>

  <rect x="432" y="152" width="188" height="56" rx="8" stroke-width="0.5" class="box-coral"/>
  <text class="th" x="526" y="177" text-anchor="middle">modelo_ia.py</text>
  <text class="ts" x="526" y="194" text-anchor="middle">Random Forest — 99,92%</text>

  <line x1="296" y1="170" x2="248" y2="170" class="arr" marker-end="url(#arrow)"/>
  <line x1="384" y1="170" x2="432" y2="170" class="arr" marker-end="url(#arrow)"/>

  <!-- Camada 3: Persistência e Modelo -->
  <line x1="154" y1="208" x2="154" y2="268" class="arr" marker-end="url(#arrow)"/>
  <text class="ts" x="154" y="262" text-anchor="middle" fill="#888">Persistência</text>

  <rect x="60" y="280" width="188" height="86" rx="8" stroke-width="0.5" class="box-blue"/>
  <text class="th" x="154" y="305" text-anchor="middle">Oracle DB</text>
  <text class="ts" x="154" y="322" text-anchor="middle">equipamentos</text>
  <text class="ts" x="154" y="337" text-anchor="middle">leituras_energia</text>
  <text class="ts" x="154" y="352" text-anchor="middle">alertas · previsoes</text>

  <line x1="526" y1="208" x2="526" y2="268" class="arr" marker-end="url(#arrow)"/>
  <text class="ts" x="526" y="262" text-anchor="middle" fill="#888">Modelo serializado</text>

  <rect x="432" y="280" width="188" height="86" rx="8" stroke-width="0.5" class="box-coral"/>
  <text class="th" x="526" y="308" text-anchor="middle">random_forest.pkl</text>
  <text class="ts" x="526" y="328" text-anchor="middle">9 features → 3 classes</text>
  <text class="ts" x="526" y="346" text-anchor="middle">score 0–100</text>

  <!-- Convergência para dashboard -->
  <line x1="154" y1="366" x2="154" y2="430" class="arr" marker-end="url(#arrow)"/>
  <line x1="526" y1="366" x2="526" y2="430" class="arr" marker-end="url(#arrow)"/>
  <path d="M154 430 L154 450 L340 450" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M526 430 L526 450 L340 450" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Camada 4: Dashboard -->
  <text class="ts" x="340" y="424" text-anchor="middle" fill="#888">Saída</text>

  <rect x="160" y="462" width="360" height="86" rx="8" stroke-width="0.5" class="box-amber"/>
  <text class="th" x="340" y="490" text-anchor="middle">dashboard.py</text>
  <text class="ts" x="340" y="508" text-anchor="middle">Interface Tkinter — 9 telas</text>
  <text class="ts" x="340" y="524" text-anchor="middle">Alertas · Score · Gráficos · Recomendações IA</text>

  <!-- Arrows to personas -->
  <line x1="260" y1="548" x2="200" y2="594" class="arr" marker-end="url(#arrow)"/>
  <line x1="340" y1="548" x2="340" y2="594" class="arr" marker-end="url(#arrow)"/>
  <line x1="420" y1="548" x2="480" y2="594" class="arr" marker-end="url(#arrow)"/>

  <!-- Personas -->
  <rect x="100" y="606" width="148" height="48" rx="8" stroke-width="0.5" class="box-green"/>
  <text class="th" x="174" y="629" text-anchor="middle">Operador</text>
  <text class="ts" x="174" y="647" text-anchor="middle">Score em tempo real</text>

  <rect x="266" y="606" width="148" height="48" rx="8" stroke-width="0.5" class="box-green"/>
  <text class="th" x="340" y="629" text-anchor="middle">Gestor de Frota</text>
  <text class="ts" x="340" y="647" text-anchor="middle">Mapas de criticidade</text>

  <rect x="432" y="606" width="148" height="48" rx="8" stroke-width="0.5" class="box-green"/>
  <text class="th" x="506" y="629" text-anchor="middle">Sompo Seguros</text>
  <text class="ts" x="506" y="647" text-anchor="middle">Prevenção de sinistros</text>

  <!-- Legend -->
  <rect x="60"  y="680" width="12" height="12" rx="2" class="box-teal"/>
  <text class="ts" x="77"  y="691">Entrada</text>
  <rect x="150" y="680" width="12" height="12" rx="2" class="box-purple"/>
  <text class="ts" x="167" y="691">Simulação</text>
  <rect x="256" y="680" width="12" height="12" rx="2" class="box-blue"/>
  <text class="ts" x="273" y="691">Banco</text>
  <rect x="338" y="680" width="12" height="12" rx="2" class="box-coral"/>
  <text class="ts" x="355" y="691">Modelo IA</text>
  <rect x="444" y="680" width="12" height="12" rx="2" class="box-amber"/>
  <text class="ts" x="461" y="691">Dashboard</text>
  <rect x="548" y="680" width="12" height="12" rx="2" class="box-green"/>
  <text class="ts" x="565" y="691">Personas</text>
</svg>
